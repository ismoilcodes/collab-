<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noble Finances</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">

  <!-- Navbar -->
  <header class="bg-green-200">
    <div class="max-w-7xl mx-auto flex justify-between items-center py-6 px-8">
      <h1 class="text-2xl font-bold text-gray-800">
        Noble Finances
      </h1>

      <div class="flex items-center gap-8">
        <a href="#" class="text-gray-700 hover:text-black">
          Services
        </a>

        <button
          class="bg-green-900 text-white px-6 py-3 rounded-full hover:bg-green-800 transition">
          Book an appointment
        </button>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section class="max-w-7xl mx-auto px-8 py-20">

    <div class="flex flex-col lg:flex-row items-center justify-between gap-16">

      <!-- Left -->
      <div class="lg:w-1/2">

        <h2 class="text-6xl lg:text-7xl font-semibold text-green-900 leading-tight">
          Your Financial Journey, Clearly Defined
        </h2>

        <p class="mt-8 text-gray-500 text-lg">
          Trusted financial guidance for every stage of life and business since 1987.
        </p>

        <button
          class="mt-10 bg-green-900 text-white px-7 py-4 rounded-full hover:bg-green-800 transition">
          Connect with our experts
        </button>

      </div>

      <!-- Right -->
      <div class="lg:w-1/2 flex justify-center">

        <!-- Rasmni shu yerga almashtiring -->
        <img
          src="finance.png"
          alt="Finance"
          class="w-full max-w-lg">

      </div>

    </div>

  </section>

</body>
</html>
